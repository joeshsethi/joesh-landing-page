name: Weekly Feedback Review

# Sundays 22:00 UTC. Reads the week's feedback, appends a review entry to
# aidailybriefing/decisions.md, writes preferences.proposed.md, and opens a PR
# so YOU approve the steering change (manual-to-start). Becomes useful once the
# AWS feedback backend is live (Phase 2); until then it just records "no signals yet".
on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    env:
      AIDB_OUT_DIR: ../public/AiDailyBriefing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aidailybriefing/package-lock.json

      - name: Install agent dependencies
        working-directory: aidailybriefing
        run: npm ci

      - name: Run feedback review
        working-directory: aidailybriefing
        env:
          AIDB_STORE: ${{ secrets.AIDB_STORE }}
          AIDB_DDB_TABLE: ${{ secrets.AIDB_DDB_TABLE }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: npm run review

      - name: Open a PR with the proposed steering changes
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: weekly feedback review"
          branch: weekly-review
          title: "Weekly feedback review — proposed preference changes"
          body: |
            Auto-generated by aidailybriefing/agent/review.js. Review
            aidailybriefing/decisions.md for the reasoning and
            aidailybriefing/preferences.proposed.md for the suggested guidance.
            To accept: copy the proposal over aidailybriefing/preferences.md and merge.
          add-paths: |
            aidailybriefing/decisions.md
            aidailybriefing/preferences.proposed.md
