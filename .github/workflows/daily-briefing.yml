name: Daily AI Briefing

# Runs ~06:30 JST every morning (21:30 UTC). Generates a fresh briefing.json into
# public/AiDailyBriefing and commits it — pushing to main triggers a Vercel rebuild,
# so the live page at joeshsethi.com/AiDailyBriefing updates on its own.
on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      AIDB_OUT_DIR: ../public/AiDailyBriefing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aidailybriefing/package-lock.json

      - name: Install agent dependencies
        working-directory: aidailybriefing
        run: npm ci

      - name: Generate today's briefing (+ source link check)
        working-directory: aidailybriefing
        env:
          # Add in repo Settings → Secrets and variables → Actions.
          # If absent, the agent falls back to a dry-run (template freshen).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional cost tuning via repo Variables (Settings → Secrets and
          # variables → Actions → Variables). Empty = the code defaults
          # (sonnet-4-6 / medium / 8 searches). No code edit needed to change them.
          AIDB_MODEL: ${{ vars.AIDB_MODEL }}
          AIDB_EFFORT: ${{ vars.AIDB_EFFORT }}
          AIDB_MAX_SEARCHES: ${{ vars.AIDB_MAX_SEARCHES }}
        run: npm run briefing -- --verify-sources

      - name: Validate output against the schema
        working-directory: aidailybriefing
        run: node agent/validate.js ../public/AiDailyBriefing/briefing.json

      - name: Commit & push if changed
        run: |
          git config user.name  "ai-briefing-bot"
          git config user.email "ai-briefing-bot@users.noreply.github.com"
          git add public/AiDailyBriefing/briefing.json public/AiDailyBriefing/briefing-*.json aidailybriefing/decisions.md
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "chore: daily AI briefing $(date -u +%Y-%m-%d)"
          # Self-heal if main moved while the run was working (rebase, then push).
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push attempt $attempt failed; retrying..."; sleep 5
          done
          echo "::error::could not push after 3 attempts"; exit 1
