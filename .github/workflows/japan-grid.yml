name: Japan Grid Suppliers

# A separate cycle from the daily news. Researches Japanese grid + data-center power
# manufacturers and publishes a vetted target list to public/JapanGrid/suppliers.json.
# Primarily on-demand (Run workflow), with a light weekly refresh.
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 19 * * 1" # Mondays 19:00 UTC (≈ 04:00 JST Tue) — weekly refresh

permissions:
  contents: write

concurrency:
  group: japan-grid
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aidailybriefing/package-lock.json

      - name: Install agent dependencies
        working-directory: aidailybriefing
        run: npm ci

      - name: Research Japan grid suppliers
        working-directory: aidailybriefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AIDB_MODEL: ${{ vars.AIDB_MODEL }}
          AIDB_GRID_MAX_SEARCHES: ${{ vars.AIDB_GRID_MAX_SEARCHES }}
        run: npm run japan-grid

      - name: Commit & push if changed
        run: |
          git config user.name  "ai-briefing-bot"
          git config user.email "ai-briefing-bot@users.noreply.github.com"
          git add public/JapanGrid/suppliers.json aidailybriefing/decisions.md
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi
          git commit -m "chore: japan grid suppliers $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin HEAD:main; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push attempt $attempt failed; retrying..."; sleep 5
          done
          echo "::error::could not push after 3 attempts"; exit 1
